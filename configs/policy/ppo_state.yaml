policy:
  type: ppo
  network:
    type: state_mlp
    hidden_dims: [256, 256, 128]
    activation: relu
  obs_type: state
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 2048
  n_epochs: 10
  batch_size: 64
