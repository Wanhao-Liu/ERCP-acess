# train.yaml — YOLOv8-nano two-phase fine-tuning configuration for papilla detection

# ── Model ─────────────────────────────────────────────────────────────────────
model: yolov8n.pt            # YOLOv8-nano pretrained on COCO

# ── Dataset ───────────────────────────────────────────────────────────────────
data: /data/ERCP/ercp_access/configs/yolo/papilla_dataset.yaml

# ── Training schedule ─────────────────────────────────────────────────────────
epochs: 100
patience: 20                 # early stopping patience
batch: 16
imgsz: 640
workers: 4

# ── Optimizer ─────────────────────────────────────────────────────────────────
optimizer: AdamW
lr0: 0.001                   # initial learning rate (phase 1: frozen backbone)
lrf: 0.01                    # final lr = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ── Backbone freezing ─────────────────────────────────────────────────────────
# Phase 1 (epochs 0-49): freeze first 10 layers (backbone)
# Phase 2 (epoch 50+):   unfreeze all, lr drops to lr0/10 = 0.0001
freeze: 10                   # number of backbone layers to freeze in phase 1

# ── Data augmentation ─────────────────────────────────────────────────────────
hsv_h: 0.015                 # hue augmentation fraction
hsv_s: 0.7                   # saturation augmentation fraction
hsv_v: 0.4                   # value (brightness) augmentation fraction
degrees: 10.0                # rotation range (degrees)
translate: 0.1               # translation fraction
scale: 0.5                   # scale gain
shear: 2.0                   # shear angle (degrees)
perspective: 0.0             # perspective distortion
flipud: 0.0                  # vertical flip probability (not applicable for medical)
fliplr: 0.5                  # horizontal flip probability
mosaic: 1.0                  # mosaic augmentation probability
mixup: 0.1                   # mixup augmentation probability
copy_paste: 0.0              # copy-paste augmentation probability

# ── Loss weights ──────────────────────────────────────────────────────────────
box: 7.5                     # box loss weight
cls: 0.5                     # classification loss weight
dfl: 1.5                     # distribution focal loss weight

# ── Output ────────────────────────────────────────────────────────────────────
project: /data/ERCP/ercp_access/outputs/perception/yolo_papilla
name: yolov8n_v1
exist_ok: false
save_period: 10              # save checkpoint every N epochs
plots: true
val: true
